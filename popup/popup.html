<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Autofill</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <div class="header-icon">💼</div>
        <div class="header-text">
          <h1>Job Autofill</h1>
          <!-- <p>Fill job applications instantly</p> -->
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-header" id="autofillBtn" title="Autofill This Page">
          <span class="btn-icon">✨</span>
          <span class="btn-text">Fill</span>
        </button>
        <button class="btn-header btn-header-secondary" id="clearBtn" title="Clear Filled Fields">
          <span class="btn-icon">🗑️</span>
        </button>
      </div>
    </header>

    <!-- Expand Toggle -->
    <button class="expand-toggle" id="expandToggle" title="Click to expand · Double-click to collapse">
      <span class="expand-icon" id="expandIcon">▾</span>
      <span class="expand-label" id="expandLabel">Profile Details</span>
    </button>

    <!-- Collapsible Details Panel -->
    <div class="details-panel" id="detailsPanel">

    <!-- Tab Navigation -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="profile">
        <span class="tab-icon">👤</span>
        Profile
      </button>
      <button class="tab-btn" data-tab="education">
        <span class="tab-icon">🎓</span>
        Education
      </button>
      <button class="tab-btn" data-tab="experience">
        <span class="tab-icon">💼</span>
        Experience
      </button>
    </nav>

    <!-- Tab: Profile -->
    <div class="tab-content active" id="tab-profile">
      <div class="form-section">
        <h2 class="section-title">Personal Information</h2>
        <div class="form-row form-row-title">
          <div class="form-group">
            <label for="title">Title</label>
            <select id="title">
              <option value="">--</option>
              <option value="Mr">Mr</option>
              <option value="Mrs">Mrs</option>
              <option value="Ms">Ms</option>
              <option value="Dr">Dr</option>
            </select>
          </div>
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" placeholder="John" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="middleName">Middle Name</label>
            <input type="text" id="middleName" placeholder="(optional)" />
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" placeholder="Doe" />
          </div>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="john.doe@example.com" />
        </div>
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="+91 98765 43210" />
        </div>
      </div>

      <div class="form-section">
        <h2 class="section-title">Address</h2>
        <div class="form-group">
          <label for="address">Street Address</label>
          <input type="text" id="address" placeholder="123 Main Street" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" placeholder="Mumbai" />
          </div>
          <div class="form-group">
            <label for="state">State</label>
            <input type="text" id="state" placeholder="Maharashtra" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="zip">ZIP / Postal Code</label>
            <input type="text" id="zip" placeholder="400001" />
          </div>
          <div class="form-group">
            <label for="country">Country</label>
            <input type="text" id="country" placeholder="India" />
          </div>
        </div>
      </div>

      <div class="form-section">
        <h2 class="section-title">Personal Details</h2>
        <div class="form-group">
          <label for="alternateEmail">Alternate Email</label>
          <input type="email" id="alternateEmail" placeholder="alt@example.com" />
        </div>
        <div class="form-group">
          <label for="alternateMobile">Alternate Mobile</label>
          <input type="tel" id="alternateMobile" placeholder="+91 98765 00000" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender">
              <option value="">-- Select --</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="maritalStatus">Marital Status</label>
            <select id="maritalStatus">
              <option value="">-- Select --</option>
              <option value="Single">Single</option>
              <option value="Married">Married</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="dateOfBirth">Date of Birth</label>
          <input type="date" id="dateOfBirth" />
        </div>
      </div>

      <div class="form-section">
        <h2 class="section-title">Online Presence</h2>
        <div class="form-group">
          <label for="linkedIn">LinkedIn URL</label>
          <input type="url" id="linkedIn" placeholder="https://linkedin.com/in/johndoe" />
        </div>
        <div class="form-group">
          <label for="website">Portfolio / Website</label>
          <input type="url" id="website" placeholder="https://johndoe.dev" />
        </div>
      </div>

      <div class="save-bar">
        <button class="btn btn-primary save-btn" id="saveProfileBtn">
          <span class="btn-icon">💾</span> Save Profile
        </button>
      </div>
    </div>

    <!-- Tab: Education & Resume -->
    <div class="tab-content" id="tab-education">
      <div class="form-section">
        <h2 class="section-title">Education</h2>
        <div class="form-group">
          <label for="collegeName">College / University</label>
          <input type="text" id="collegeName" placeholder="IIT Bombay" />
        </div>
        <div class="form-group">
          <label for="degree">Degree</label>
          <select id="degree">
            <option value="">-- Select Degree --</option>
            <option value="B.Tech/B.E.">B.Tech / B.E.</option>
            <option value="B.Sc">B.Sc</option>
            <option value="BCA">BCA</option>
            <option value="MBA">MBA</option>
            <option value="MCA">MCA</option>
            <option value="M.Tech">M.Tech</option>
            <option value="Ph.D">Ph.D</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="fieldOfStudy">Field of Study</label>
            <input type="text" id="fieldOfStudy" placeholder="Computer Science" />
          </div>
          <div class="form-group">
            <label for="graduationYear">Graduation Year</label>
            <input type="text" id="graduationYear" placeholder="2024" />
          </div>
        </div>
      </div>

      <div class="form-section">
        <h2 class="section-title">Cover Letter</h2>
        <div class="form-group">
          <label for="coverLetter">Cover Letter</label>
          <textarea id="coverLetter" rows="5" placeholder="Write a brief cover letter that will be autofilled on application forms..."></textarea>
        </div>
      </div>

      <div class="form-section">
        <h2 class="section-title">Resume</h2>
        <div class="form-group">
          <label for="resumeFile">Upload Resume (PDF only)</label>
          <div class="file-upload-area" id="fileUploadArea">
            <div class="file-upload-icon">📄</div>
            <div class="file-upload-text">
              <span id="resumeFileLabel">Click to upload or drag &amp; drop</span>
              <small>PDF files only</small>
            </div>
            <input type="file" id="resumeFile" accept=".pdf,application/pdf" />
          </div>
          <div class="file-info" id="fileInfo" style="display:none;">
            <span class="file-icon">📎</span>
            <span id="resumeFileName" class="file-name"></span>
            <button class="file-remove" id="removeResumeBtn" title="Remove resume">✕</button>
          </div>
        </div>
      </div>

      <div class="save-bar">
        <button class="btn btn-primary save-btn" id="saveEducationBtn">
          <span class="btn-icon">💾</span> Save Profile
        </button>
      </div>
    </div>


    <!-- Tab: Experience -->
    <div class="tab-content" id="tab-experience">
      <div class="form-section">
        <h2 class="section-title">Work Experience</h2>
        <div class="form-row">
          <div class="form-group">
            <label for="totalExperience">Total Experience</label>
            <input type="text" id="totalExperience" placeholder="e.g. 3 Years" />
          </div>
          <div class="form-group">
            <label for="itExperience">IT Experience</label>
            <input type="text" id="itExperience" placeholder="e.g. 2 Years" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="experienceYears">Experience in Years</label>
            <input type="text" id="experienceYears" placeholder="e.g. 3" />
          </div>
          <div class="form-group">
            <label for="noticePeriod">Notice Period (Days)</label>
            <input type="text" id="noticePeriod" placeholder="e.g. 30" />
          </div>
        </div>
        <div class="form-group">
          <label for="organisation">Current Organisation</label>
          <input type="text" id="organisation" placeholder="Company name" />
        </div>
        <div class="form-group">
          <label for="designation">Current Designation</label>
          <input type="text" id="designation" placeholder="e.g. Software Engineer" />
        </div>
      </div>

      <div class="form-section">
        <h2 class="section-title">Job Preferences</h2>
        <div class="form-group">
          <label for="preferredLocation">Preferred Location</label>
          <input type="text" id="preferredLocation" placeholder="e.g. Bangalore, Mumbai" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="currentCTC">Current CTC</label>
            <input type="text" id="currentCTC" placeholder="e.g. 6 LPA" />
          </div>
          <div class="form-group">
            <label for="expectedCTC">Expected CTC</label>
            <input type="text" id="expectedCTC" placeholder="e.g. 9 LPA" />
          </div>
        </div>
      </div>

      <div class="save-bar">
        <button class="btn btn-primary save-btn" id="saveExperienceBtn">
          <span class="btn-icon">💾</span> Save Profile
        </button>
      </div>
    </div>

    <!-- Autofill Status Display (Globally visible) -->
    <div class="status-area" id="statusArea" style="display:none;">
      <div class="status-header">
        <span class="status-title">Last Fill Results</span>
        <button class="status-close" id="closeStatusBtn" title="Close">✕</button>
      </div>
      <div class="status-stats">
        <div class="stat stat-filled">
          <span class="stat-count" id="filledCount">0</span>
          <span class="stat-label">Filled</span>
        </div>
        <div class="stat stat-skipped">
          <span class="stat-count" id="skippedCount">0</span>
          <span class="stat-label">Skipped</span>
        </div>
        <div class="status-badge-container">
          <span class="status-badge" id="statusBadge"></span>
        </div>
      </div>
      <div class="status-errors" id="statusErrors" style="display:none;">
        <div class="error-title">Errors</div>
        <ul id="errorList"></ul>
      </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    </div><!-- /.details-panel -->
  </div>

  <script src="popup.js"></script>
</body>
</html>
